<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wedding Invitation</title>
    <meta name="description" content="소중한 분들을 결혼식에 초대합니다.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Wedding Invitation">
    <meta property="og:description" content="소중한 분들을 결혼식에 초대합니다.">
    <meta property="og:url" content="https://wedding.hamyeon.com">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero__image" id="heroImage" aria-label="웨딩 대표 사진"></div>
        <div class="hero__content">
          <p class="eyebrow">Wedding Invitation</p>
          <h1 id="title">저희 결혼합니다</h1>
          <p class="names"><span id="groom">함께할 사람</span> &amp; <span id="bride">곁에 있을 사람</span></p>
        </div>
      </section>

      <section class="section intro">
        <p id="intro">서로의 하루에 가장 다정한 사람이 되어, 이제 같은 계절을 걸어가려 합니다.</p>
      </section>

      <section class="section details">
        <h2>예식 안내</h2>
        <dl>
          <div>
            <dt>날짜</dt>
            <dd id="displayDate">2026년 11월 어느 좋은 날</dd>
          </div>
          <div>
            <dt>시간</dt>
            <dd id="time">낮 12시</dd>
          </div>
          <div>
            <dt>장소</dt>
            <dd id="venue">예식장 이름</dd>
          </div>
          <div>
            <dt>주소</dt>
            <dd id="address">예식장 주소</dd>
          </div>
        </dl>
      </section>

      <section class="section gallery" id="gallerySection" hidden>
        <h2>Gallery</h2>
        <div class="gallery__grid" id="gallery"></div>
      </section>

      <section class="section closing">
        <p id="closing">소중한 걸음으로 축복해 주시면 큰 기쁨으로 간직하겠습니다.</p>
      </section>

      <button class="music" id="musicButton" type="button" hidden>음악 재생</button>
      <audio id="bgm" loop preload="none"></audio>
    </main>

    <script src="app.js"></script>
  </body>
</html>
